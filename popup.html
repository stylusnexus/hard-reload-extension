<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 260px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      padding: 16px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 14px;
      color: #ffffff;
      letter-spacing: 0.5px;
    }

    .btn {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 8px;
      background: #16213e;
      color: #e0e0e0;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: left;
    }

    .btn:hover {
      background: #0f3460;
      border-color: rgba(255, 255, 255, 0.15);
      transform: translateY(-1px);
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn + .btn {
      margin-top: 8px;
    }

    .btn-icon {
      font-size: 18px;
      flex-shrink: 0;
    }

    .btn-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .btn-label {
      font-weight: 600;
      color: #ffffff;
    }

    .btn-desc {
      font-size: 11px;
      color: #8892a4;
    }

    .btn.hard-reload:hover {
      border-color: #4cc9f0;
      box-shadow: 0 0 12px rgba(76, 201, 240, 0.15);
    }

    .btn.clear-cache:hover {
      border-color: #f72585;
      box-shadow: 0 0 12px rgba(247, 37, 133, 0.15);
    }

    .feedback {
      text-align: center;
      font-size: 11px;
      margin-top: 10px;
      height: 16px;
      color: #4cc9f0;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .feedback.show {
      opacity: 1;
    }
  </style>
</head>
<body>
  <h1>Hard Reload</h1>

  <button class="btn hard-reload" id="hardReload">
    <span class="btn-icon">🔄</span>
    <span class="btn-text">
      <span class="btn-label">Hard Reload</span>
      <span class="btn-desc">Bypass cache and reload page</span>
    </span>
  </button>

  <button class="btn clear-cache" id="clearCacheReload">
    <span class="btn-icon">🧹</span>
    <span class="btn-text">
      <span class="btn-label">Clear Cache + Reload</span>
      <span class="btn-desc">Wipe all cache then hard reload</span>
    </span>
  </button>

  <div class="feedback" id="feedback"></div>

  <script src="popup.js"></script>
</body>
</html>
